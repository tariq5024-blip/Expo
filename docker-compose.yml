services:
  mongo:
    image: mongo:7
    container_name: expo-mongo
    restart: unless-stopped
    init: true
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: expo-app
    restart: unless-stopped
    init: true
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/expo}
      PORT: ${PORT:-5000}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_string}
      SESSION_MAX_AGE_MS: ${SESSION_MAX_AGE_MS:-2592000000}
      COOKIE_SECURE: ${COOKIE_SECURE:-auto}
      COOKIE_SECRET: ${COOKIE_SECRET:-change_me_to_random_32_bytes}
      EMERGENCY_RESET_SECRET: ${EMERGENCY_RESET_SECRET:-emergency_unlock}
      ENABLE_CSRF: ${ENABLE_CSRF:-true}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      MAX_BACKUP_UPLOAD_MB: ${MAX_BACKUP_UPLOAD_MB:-250}
    ports:
      - "5000:5000"
    volumes:
      - app_uploads:/app/server/uploads
      - app_backups:/app/server/backups
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/api/healthz', (r)=>process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: expo-web
    restart: unless-stopped
    init: true
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo_data:
  app_uploads:
  app_backups:
