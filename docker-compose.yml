services:
  mongo:
    image: mongo:7
    container_name: expo-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: expo-app
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/expo
      PORT: "5000"
      NODE_ENV: production
      JWT_SECRET: change_this_to_a_secure_random_string
      SESSION_MAX_AGE_MS: "2592000000"
      COOKIE_SECURE: "false"
      COOKIE_SECRET: change_me_to_random_32_bytes
      EMERGENCY_RESET_SECRET: emergency_unlock
      ENABLE_CSRF: "true"
      SEED_DEFAULTS: "true"
    ports:
      - "5000:5000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: expo-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "3000:80"
    volumes:
      - ./nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
