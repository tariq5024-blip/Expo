services:
  mongo:
    image: mongo:7
    container_name: expo-mongo
    restart: unless-stopped
    init: true
    ports:
      - "${MONGO_BIND_ADDRESS:-127.0.0.1}:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: expo-app
    restart: unless-stopped
    init: true
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/expo}
      LOCAL_FALLBACK_MONGO_URI: ${LOCAL_FALLBACK_MONGO_URI:-mongodb://mongo:27017/expo}
      ALLOW_INMEMORY_FALLBACK: ${ALLOW_INMEMORY_FALLBACK:-false}
      SHADOW_DB_NAME: ${SHADOW_DB_NAME:-expo_shadow}
      ENABLE_BACKUP_SCHEDULER: ${ENABLE_BACKUP_SCHEDULER:-true}
      PORT: ${PORT:-5000}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SESSION_MAX_AGE_MS: ${SESSION_MAX_AGE_MS:-2592000000}
      COOKIE_SECURE: ${COOKIE_SECURE:-auto}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5000}
      EMERGENCY_RESET_SECRET: ${EMERGENCY_RESET_SECRET:?EMERGENCY_RESET_SECRET is required}
      ENABLE_CSRF: ${ENABLE_CSRF:-true}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      MAX_BACKUP_UPLOAD_MB: ${MAX_BACKUP_UPLOAD_MB:-1024}
    ports:
      - "5000:5000"
    volumes:
      - app_uploads:/app/server/uploads
      - app_backups:/app/server/backups
      - app_storage:/app/server/storage
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/api/healthz', (r)=>process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: expo-web
    restart: unless-stopped
    init: true
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo_data:
  app_uploads:
  app_backups:
  app_storage:
