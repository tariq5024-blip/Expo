version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expo-asset-web
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/expo_stores?retryWrites=true&w=majority
      - SESSION_MAX_AGE_MS=2592000000
      - COOKIE_SECURE=true
      - ENABLE_CSRF=true
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: expo-asset-mongo
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
