apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: expo-uploads-pvc
  namespace: expo-stores
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: expo-backups-pvc
  namespace: expo-stores
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: expo-app
  namespace: expo-stores
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expo-app
  template:
    metadata:
      labels:
        app: expo-app
    spec:
      nodeSelector:
        role: app
      containers:
      - name: app
        image: registry.example.com/expo-stores/app:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: uploads
          mountPath: /app/server/uploads
        - name: backups
          mountPath: /app/server/backups
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: expo-uploads-pvc
      - name: backups
        persistentVolumeClaim:
          claimName: expo-backups-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: app-svc
  namespace: expo-stores
spec:
  selector:
    app: expo-app
  ports:
  - name: http
    port: 5000
    targetPort: 5000
