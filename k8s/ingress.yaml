apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: expo-ingress
  namespace: expo-stores
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  tls:
  - hosts:
    - expo.example.com
    secretName: expo-tls
  rules:
  - host: expo.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: app-svc
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-svc
            port:
              number: 80
