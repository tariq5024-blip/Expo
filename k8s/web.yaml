apiVersion: apps/v1
kind: Deployment
metadata:
  name: expo-web
  namespace: expo-stores
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expo-web
  template:
    metadata:
      labels:
        app: expo-web
    spec:
      nodeSelector:
        role: web
      containers:
      - name: web
        image: registry.example.com/expo-stores/web:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: expo-stores
spec:
  selector:
    app: expo-web
  ports:
  - name: http
    port: 80
    targetPort: 80
